<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Monitoring - YouTube Automation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/unified-navigation.css">
    <style>
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --dark-bg: #1a1d2e;
            --card-bg: #22263a;
            --text-primary: #f3f4f6;
            --text-secondary: #d1d5db;
        }

        body {
            background: linear-gradient(135deg, var(--dark-bg) 0%, #16213e 100%);
            color: var(--text-primary);
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .navbar {
            background: rgba(34, 38, 58, 0.95) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
        }

        .nav-menu {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 0.5rem;
            margin-bottom: 2rem;
        }

        .nav-menu a {
            color: #d1d5db;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: inline-block;
            margin: 0.25rem;
        }

        .nav-menu a:hover {
            background: rgba(102, 126, 234, 0.2);
            color: var(--text-primary);
        }

        .nav-menu a.active {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 16px;
            margin-bottom: 1.5rem;
        }

        .card-header {
            background: transparent;
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
            padding: 1.25rem;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-running {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }

        .status-succeeded {
            background: linear-gradient(135deg, var(--success-color), #059669);
            color: white;
        }

        .status-failed {
            background: linear-gradient(135deg, var(--danger-color), #dc2626);
            color: white;
        }

        .status-pending {
            background: linear-gradient(135deg, var(--warning-color), #d97706);
            color: white;
        }

        .execution-item {
            padding: 1rem;
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
            transition: background 0.2s ease;
            cursor: pointer;
        }

        .execution-item:hover {
            background: rgba(102, 126, 234, 0.05);
        }

        .execution-item:last-child {
            border-bottom: none;
        }

        .log-viewer {
            background: #0d1117;
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 8px;
            padding: 1rem;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.85rem;
        }

        .log-entry {
            padding: 0.25rem 0;
            border-left: 3px solid transparent;
            padding-left: 0.5rem;
            margin-bottom: 0.25rem;
        }

        .log-entry.log-info {
            border-left-color: #3b82f6;
            color: #93c5fd;
        }

        .log-entry.log-error {
            border-left-color: #ef4444;
            color: #fca5a5;
        }

        .log-entry.log-warning {
            border-left-color: #f59e0b;
            color: #fcd34d;
        }

        .log-entry.log-success {
            border-left-color: #10b981;
            color: #6ee7b7;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: #d1d5db;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .refresh-btn {
            animation: rotate 1s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .timestamp {
            color: #d1d5db;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <!-- Unified Navigation -->
    <nav class="nav-container">
        <div class="nav-wrapper">
            <div class="nav-bar">
                <a href="index.html" class="nav-link">
                    <i class="bi bi-house-door"></i> Home
                </a>
                <a href="dashboard.html" class="nav-link active">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </a>
                <a href="channels.html" class="nav-link">
                    <i class="bi bi-collection"></i> Channels
                </a>
                <a href="content.html" class="nav-link">
                    <i class="bi bi-file-earmark-text"></i> Content
                </a>
                <a href="costs.html" class="nav-link">
                    <i class="bi bi-currency-dollar"></i> Costs
                </a>
                <a href="prompts-editor.html" class="nav-link">
                    <i class="bi bi-pencil-square"></i> Prompts
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <!-- Stats Row -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-value" id="runningExecutions">-</div>
                    <div class="stat-label">Running</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-value text-success" id="succeededExecutions">-</div>
                    <div class="stat-label">Succeeded Today</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-value text-danger" id="failedExecutions">-</div>
                    <div class="stat-label">Failed Today</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-value" id="avgDuration">-</div>
                    <div class="stat-label">Avg Duration (min)</div>
                </div>
            </div>
        </div>

        <!-- Step Functions Executions -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-diagram-3"></i> Step Functions Executions</span>
                <button class="btn btn-sm btn-primary" onclick="refreshExecutions()">
                    <i class="bi bi-arrow-clockwise" id="refreshIcon"></i> Refresh
                </button>
            </div>
            <div class="card-body">
                <div id="executionsList">
                    <div class="text-center text-secondary py-5">
                        <i class="bi bi-hourglass-split" style="font-size: 3rem;"></i>
                        <p class="mt-3">Loading executions...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- CloudWatch Logs -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-terminal"></i> CloudWatch Logs (Latest 50)</span>
                <button class="btn btn-sm btn-primary" onclick="refreshLogs()">
                    <i class="bi bi-arrow-clockwise"></i> Refresh
                </button>
            </div>
            <div class="card-body">
                <div class="log-viewer" id="logsViewer">
                    <div class="text-secondary">Loading logs...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Execution Details Modal -->
    <div id="executionModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; align-items: center; justify-content: center;">
        <div style="background: var(--card-bg); border-radius: 16px; padding: 2rem; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; border: 1px solid rgba(102, 126, 234, 0.3);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3 style="margin: 0; color: var(--text-primary);">
                    <i class="bi bi-info-circle"></i> Execution Details
                </h3>
                <button onclick="closeExecutionModal()" style="background: none; border: none; color: #d1d5db; font-size: 1.5rem; cursor: pointer; padding: 0; line-height: 1;">
                    &times;
                </button>
            </div>

            <div id="executionDetailsContent">
                <!-- Content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://e2c5y2h1qj.execute-api.eu-central-1.amazonaws.com/prod';
        let currentExecutions = [];

        async function refreshExecutions() {
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('refresh-btn');

            try {
                const response = await fetch(`${API_URL}/monitoring/executions`);
                const data = await response.json();

                displayExecutions(data.executions || []);
                updateStats(data.stats || {});
            } catch (error) {
                console.error('Error loading executions:', error);
                document.getElementById('executionsList').innerHTML = `
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle"></i> Failed to load executions: ${error.message}
                    </div>
                `;
            } finally {
                icon.classList.remove('refresh-btn');
            }
        }

        function displayExecutions(executions) {
            currentExecutions = executions;

            if (executions.length === 0) {
                document.getElementById('executionsList').innerHTML = `
                    <div class="text-center text-secondary py-5">
                        <i class="bi bi-inbox" style="font-size: 3rem;"></i>
                        <p class="mt-3">No executions found</p>
                    </div>
                `;
                return;
            }

            const html = executions.map((exec, index) => `
                <div class="execution-item" onclick="showExecutionDetails(currentExecutions[${index}])">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <strong>${exec.name || 'Unnamed Execution'}</strong>
                            <br>
                            <small class="timestamp">
                                <i class="bi bi-clock"></i> ${formatDate(exec.startDate)}
                            </small>
                        </div>
                        <div>
                            <span class="status-badge status-${exec.status.toLowerCase()}">
                                ${getStatusIcon(exec.status)} ${exec.status}
                            </span>
                        </div>
                    </div>
                    ${exec.stopDate ? `
                        <div class="mt-2">
                            <small class="text-secondary">
                                Duration: ${calculateDuration(exec.startDate, exec.stopDate)}
                            </small>
                        </div>
                    ` : ''}
                </div>
            `).join('');

            document.getElementById('executionsList').innerHTML = html;
        }

        function updateStats(stats) {
            document.getElementById('runningExecutions').textContent = stats.running || 0;
            document.getElementById('succeededExecutions').textContent = stats.succeeded || 0;
            document.getElementById('failedExecutions').textContent = stats.failed || 0;
            document.getElementById('avgDuration').textContent = stats.avgDuration || '-';
        }

        async function refreshLogs() {
            try {
                const response = await fetch(`${API_URL}/monitoring/logs?limit=50`);
                const data = await response.json();

                displayLogs(data.logs || []);
            } catch (error) {
                console.error('Error loading logs:', error);
                document.getElementById('logsViewer').innerHTML = `
                    <div class="log-entry log-error">
                        ERROR: Failed to load logs - ${error.message}
                    </div>
                `;
            }
        }

        let currentLogs = [];

        function displayLogs(logs) {
            currentLogs = logs;

            if (logs.length === 0) {
                document.getElementById('logsViewer').innerHTML = `
                    <div class="text-secondary">No logs available</div>
                `;
                return;
            }

            const html = logs.map((log, index) => {
                const logClass = getLogClass(log.message);
                const preview = log.message.length > 150 ? log.message.substring(0, 150) + '...' : log.message;
                return `<div class="log-entry ${logClass}" style="cursor: pointer;" onclick="showLogDetails(${index})">
                    <strong>${escapeHtml(log.timestamp)}</strong><br>
                    ${escapeHtml(preview)}
                </div>`;
            }).join('');

            document.getElementById('logsViewer').innerHTML = html;
        }

        function getLogClass(message) {
            if (message.includes('ERROR') || message.includes('❌')) return 'log-error';
            if (message.includes('WARNING') || message.includes('⚠️')) return 'log-warning';
            if (message.includes('SUCCESS') || message.includes('✅')) return 'log-success';
            return 'log-info';
        }

        function getStatusIcon(status) {
            const icons = {
                'RUNNING': '<i class="bi bi-arrow-clockwise"></i>',
                'SUCCEEDED': '<i class="bi bi-check-circle"></i>',
                'FAILED': '<i class="bi bi-x-circle"></i>',
                'PENDING': '<i class="bi bi-hourglass"></i>'
            };
            return icons[status] || '<i class="bi bi-question-circle"></i>';
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('uk-UA');
        }

        function calculateDuration(start, end) {
            const duration = (new Date(end) - new Date(start)) / 1000;
            const minutes = Math.floor(duration / 60);
            const seconds = Math.floor(duration % 60);
            return `${minutes}m ${seconds}s`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showExecutionDetails(exec) {
            const modal = document.getElementById('executionModal');
            const content = document.getElementById('executionDetailsContent');

            const duration = exec.stopDate ? calculateDuration(exec.startDate, exec.stopDate) : 'Still running...';
            const errorInfo = exec.error ? `
                <div style="margin-top: 1rem; padding: 1rem; background: rgba(239, 68, 68, 0.1); border-left: 3px solid #ef4444; border-radius: 8px;">
                    <div style="font-weight: 600; color: #fca5a5; margin-bottom: 0.5rem;">
                        <i class="bi bi-exclamation-triangle"></i> Error Details
                    </div>
                    <div style="color: #d1d5db; font-size: 0.9rem; font-family: monospace;">
                        ${escapeHtml(exec.error)}
                    </div>
                </div>
            ` : '';

            content.innerHTML = `
                <div style="display: grid; gap: 1rem;">
                    <div>
                        <div style="color: #d1d5db; font-size: 0.85rem; margin-bottom: 0.25rem;">Execution Name</div>
                        <div style="color: var(--text-primary); font-weight: 500;">${exec.name || 'Unnamed Execution'}</div>
                    </div>

                    <div>
                        <div style="color: #d1d5db; font-size: 0.85rem; margin-bottom: 0.25rem;">Status</div>
                        <div>
                            <span class="status-badge status-${exec.status.toLowerCase()}">
                                ${getStatusIcon(exec.status)} ${exec.status}
                            </span>
                        </div>
                    </div>

                    <div>
                        <div style="color: #d1d5db; font-size: 0.85rem; margin-bottom: 0.25rem;">Execution ARN</div>
                        <div style="color: var(--text-primary); font-size: 0.85rem; word-break: break-all; font-family: monospace;">
                            ${exec.executionArn || 'N/A'}
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div>
                            <div style="color: #d1d5db; font-size: 0.85rem; margin-bottom: 0.25rem;">
                                <i class="bi bi-play-circle"></i> Start Time
                            </div>
                            <div style="color: var(--text-primary);">${formatDate(exec.startDate)}</div>
                        </div>
                        ${exec.stopDate ? `
                        <div>
                            <div style="color: #d1d5db; font-size: 0.85rem; margin-bottom: 0.25rem;">
                                <i class="bi bi-stop-circle"></i> End Time
                            </div>
                            <div style="color: var(--text-primary);">${formatDate(exec.stopDate)}</div>
                        </div>
                        ` : ''}
                    </div>

                    <div>
                        <div style="color: #d1d5db; font-size: 0.85rem; margin-bottom: 0.25rem;">
                            <i class="bi bi-clock-history"></i> Duration
                        </div>
                        <div style="color: var(--text-primary); font-weight: 600;">${duration}</div>
                    </div>

                    ${errorInfo}
                </div>
            `;

            modal.style.display = 'flex';
        }

        function showLogDetails(index) {
            const log = currentLogs[index];
            if (!log) return;

            const modal = document.getElementById('executionModal');
            const content = document.getElementById('executionDetailsContent');

            content.innerHTML = `
                <div style="display: grid; gap: 1rem;">
                    <div>
                        <div style="color: #d1d5db; font-size: 0.85rem; margin-bottom: 0.25rem;">
                            <i class="bi bi-clock"></i> Timestamp
                        </div>
                        <div style="color: var(--text-primary);">${escapeHtml(log.timestamp)}</div>
                    </div>

                    <div>
                        <div style="color: #d1d5db; font-size: 0.85rem; margin-bottom: 0.25rem;">
                            <i class="bi bi-file-text"></i> Full Log Message
                        </div>
                        <div style="background: #0d1117; border: 1px solid rgba(102, 126, 234, 0.2); border-radius: 8px; padding: 1rem; color: #93c5fd; font-family: monospace; font-size: 0.9rem; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-word;">
                            ${escapeHtml(log.message)}
                        </div>
                    </div>

                    ${log.logStreamName ? `
                    <div>
                        <div style="color: #d1d5db; font-size: 0.85rem; margin-bottom: 0.25rem;">
                            <i class="bi bi-diagram-3"></i> Log Stream
                        </div>
                        <div style="color: var(--text-primary); font-size: 0.85rem; word-break: break-all;">
                            ${escapeHtml(log.logStreamName)}
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;

            modal.style.display = 'flex';
        }

        function closeExecutionModal() {
            document.getElementById('executionModal').style.display = 'none';
        }

        // Close modal when clicking outside
        document.getElementById('executionModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeExecutionModal();
            }
        });

        // Auto-refresh every 30 seconds
        setInterval(() => {
            refreshExecutions();
            refreshLogs();
        }, 30000);

        // Initial load
        refreshExecutions();
        refreshLogs();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
