name: Deploy Lambda Functions to AWS

on:
  push:
    branches:
      - master
    paths:
      - 'aws/lambda/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Deploy Theme Agent Lambda
        run: |
          cd aws/lambda/content-theme-agent
          zip -r theme-agent.zip lambda_function.py
          aws lambda update-function-code \
            --function-name content-theme-agent \
            --zip-file fileb://theme-agent.zip \
            --region eu-central-1
          echo "✅ Theme Agent deployed successfully"

      - name: Deploy Narrative Architect Lambda
        run: |
          cd aws/lambda/content-narrative
          python3 create_zip.py
          aws lambda update-function-code \
            --function-name content-narrative \
            --zip-file fileb://function.zip \
            --region eu-central-1
          echo "✅ Narrative Architect deployed successfully"

      - name: Deploy Prompts API Lambda
        run: |
          cd aws/lambda/prompts-api
          zip -r prompts-api.zip lambda_function.py
          aws lambda update-function-code \
            --function-name prompts-api \
            --zip-file fileb://prompts-api.zip \
            --region eu-central-1
          echo "✅ Prompts API deployed successfully"

      - name: Deploy Image Generation Lambda
        run: |
          cd aws/lambda/content-generate-images
          python3 create_zip.py
          aws lambda update-function-code \
            --function-name content-generate-images \
            --zip-file fileb://function.zip \
            --region eu-central-1
          echo "✅ Image Generation deployed successfully"

      - name: Deploy Video Assembly Lambda
        run: |
          cd aws/lambda/content-video-assembly
          python3 create_zip.py
          aws lambda update-function-code \
            --function-name content-video-assembly \
            --zip-file fileb://function.zip \
            --region eu-central-1
          echo "✅ Video Assembly deployed successfully"

      - name: Deploy Get Channels Lambda
        run: |
          cd aws/lambda/content-get-channels
          zip -r function.zip lambda_function.py
          aws lambda update-function-code \
            --function-name content-get-channels \
            --zip-file fileb://function.zip \
            --region eu-central-1
          echo "✅ Get Channels deployed successfully"

      - name: Deploy TTS Router Lambda
        run: |
          cd aws/lambda/content-audio-tts
          zip -r function.zip lambda_function.py
          aws lambda update-function-code \
            --function-name content-audio-tts \
            --zip-file fileb://function.zip \
            --region eu-central-1
          echo "✅ TTS Router deployed successfully"

      - name: Deploy EC2 Control Lambda
        run: |
          cd aws/lambda/ec2-qwen3-control
          zip -r function.zip lambda_function.py
          aws lambda update-function-code \
            --function-name ec2-qwen3-control \
            --zip-file fileb://function.zip \
            --region eu-central-1
          echo "✅ EC2 Qwen3 Control deployed successfully"

      - name: Deployment Summary
        run: |
          echo "🚀 Deployment completed!"
          echo "- Theme Agent: content-theme-agent"
          echo "- Narrative Architect: content-narrative"
          echo "- Prompts API: prompts-api"
          echo "- Image Generation: content-generate-images"
          echo "- Video Assembly: content-video-assembly"
          echo "- Get Channels: content-get-channels"
          echo "- TTS Router: content-audio-tts"
          echo "- EC2 Control: ec2-qwen3-control"
          echo "- Region: eu-central-1"
