name: PR Review & Testing

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

env:
  AWS_REGION: eu-central-1

jobs:
  # Job 1: Code Quality Checks
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black pylint

      - name: Run Python linter (flake8)
        continue-on-error: true
        run: |
          # Check Python code style (ignore line length for now)
          flake8 aws/lambda --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check Python formatting (black)
        continue-on-error: true
        run: |
          black --check aws/lambda --extend-exclude="/(dist|build|\.eggs)/"

  # Job 2: Security Scan
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install security scanners
        run: |
          pip install bandit safety

      - name: Run Bandit security scan
        continue-on-error: true
        run: |
          bandit -r aws/lambda -f json -o bandit-report.json || true
          bandit -r aws/lambda

      - name: Check for known vulnerabilities
        continue-on-error: true
        run: |
          # This will check requirements files for known vulnerabilities
          find aws/lambda -name "requirements.txt" -exec echo "Checking {}" \; -exec safety check --file {} \; || true

  # Job 3: Run Tests
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pytest pytest-cov moto

      - name: Run Python tests
        run: |
          # Add test commands here when tests are available
          echo "Unit tests will be added in future iterations"
          # Example: pytest aws/lambda/*/test_*.py --cov --cov-report=xml

      - name: Upload coverage reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage.xml

  # Job 4: Validate Lambda Configuration
  validate-lambda:
    name: Validate Lambda Configurations
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Check Lambda function structure
        run: |
          echo "Validating Lambda function structure..."

          for dir in aws/lambda/*/; do
            func_name=$(basename "$dir")

            # Check if lambda_function.py exists
            if [ ! -f "$dir/lambda_function.py" ]; then
              echo "❌ Missing lambda_function.py in $func_name"
              exit 1
            else
              echo "✅ $func_name has lambda_function.py"
            fi

            # Check if Python syntax is valid
            python -m py_compile "$dir/lambda_function.py" || {
              echo "❌ Syntax error in $func_name/lambda_function.py"
              exit 1
            }
          done

          echo "✅ All Lambda functions have valid structure"

  # Job 5: Check for Secrets
  check-secrets:
    name: Check for Exposed Secrets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          wget https://github.com/zricethezav/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.0_linux_x64.tar.gz
          chmod +x gitleaks

      - name: Run gitleaks scan
        run: |
          ./gitleaks detect --source . --verbose --no-git || {
            echo "⚠️ Potential secrets detected"
            exit 1
          }

  # Job 6: PR Summary Comment
  pr-comment:
    name: Post PR Summary
    runs-on: ubuntu-latest
    needs: [code-quality, security-scan, test, validate-lambda, check-secrets]
    if: always()

    steps:
      - name: Create PR Comment
        uses: actions/github-script@v6
        with:
          script: |
            const results = {
              'Code Quality': '${{ needs.code-quality.result }}',
              'Security Scan': '${{ needs.security-scan.result }}',
              'Tests': '${{ needs.test.result }}',
              'Lambda Validation': '${{ needs.validate-lambda.result }}',
              'Secrets Check': '${{ needs.check-secrets.result }}'
            };

            let comment = '## 🤖 PR Review Summary\n\n';

            for (const [check, result] of Object.entries(results)) {
              const emoji = result === 'success' ? '✅' : result === 'failure' ? '❌' : '⚠️';
              comment += `${emoji} **${check}**: ${result}\n`;
            }

            const allPassed = Object.values(results).every(r => r === 'success');

            if (allPassed) {
              comment += '\n✨ All checks passed! Ready to merge.';
            } else {
              comment += '\n⚠️ Some checks failed. Please review before merging.';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
