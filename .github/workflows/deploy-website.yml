name: Deploy Website to n8n-creator.space

on:
  push:
    branches:
      - master
    paths:
      - 'prompts-editor.html'
      - 'channel-configs.html'
      - 'index.html'
      - 'dashboard.html'
      - 'costs.html'
      - 'content.html'
      - '*.html'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy HTML files to nginx server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy HTML files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "prompts-editor.html,channel-configs.html,index.html,dashboard.html,costs.html,content.html"
          target: ${{ secrets.SSH_WEB_PATH }}
          strip_components: 0

      - name: Set file permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd ${{ secrets.SSH_WEB_PATH }}
            chmod 644 prompts-editor.html channel-configs.html index.html dashboard.html costs.html content.html
            chown www-data:www-data *.html 2>/dev/null || chown nginx:nginx *.html 2>/dev/null || true
            echo "✅ HTML files deployed successfully"
            ls -lh *.html

      - name: Deployment Summary
        run: |
          echo "🚀 Website deployment completed!"
          echo "- Files: index.html, dashboard.html, costs.html, content.html, prompts-editor.html, channel-configs.html"
          echo "- Server: ${{ secrets.SSH_HOST }}"
          echo "- URLs:"
          echo "  - https://n8n-creator.space/index.html"
          echo "  - https://n8n-creator.space/dashboard.html"
          echo "  - https://n8n-creator.space/costs.html"
          echo "  - https://n8n-creator.space/content.html"
          echo "  - https://n8n-creator.space/prompts-editor.html"
          echo "  - https://n8n-creator.space/channel-configs.html"
