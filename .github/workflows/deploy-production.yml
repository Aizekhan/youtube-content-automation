name: Deploy to Production

on:
  push:
    branches:
      - master
  workflow_dispatch:  # Manual trigger

env:
  AWS_REGION: eu-central-1

jobs:
  # Job 1: Detect Changed Lambda Functions
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      lambda_changed: ${{ steps.filter.outputs.lambda }}
      frontend_changed: ${{ steps.filter.outputs.frontend }}
      terraform_changed: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Check for changes
        id: filter
        run: |
          # Check if Lambda functions changed
          if git diff --name-only HEAD~5 HEAD | grep -q "^aws/lambda/"; then
            echo "lambda=true" >> $GITHUB_OUTPUT
          else
            echo "lambda=false" >> $GITHUB_OUTPUT
          fi

          # Check if frontend changed
          if git diff --name-only HEAD~5 HEAD | grep -qE "\.(html|css|js)$"; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

          # Check if Terraform changed
          if git diff --name-only HEAD~5 HEAD | grep -q "^terraform/"; then
            echo "terraform=true" >> $GITHUB_OUTPUT
          else
            echo "terraform=false" >> $GITHUB_OUTPUT
          fi

  # Job 2: Run Tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.lambda_changed == 'true'
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pytest

      - name: Run Python tests
        run: |
          # Add test commands here when tests are available
          echo "Tests will be added in future iterations"
          # Example: pytest aws/lambda/*/test_*.py

  # Job 3: Deploy Lambda Functions
  deploy-lambda:
    name: Deploy Lambda Functions
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.detect-changes.outputs.lambda_changed == 'true'

    strategy:
      matrix:
        function:
          # Content Generation Pipeline
          - content-narrative
          - content-generate-images
          - content-audio-qwen3tts
          - content-video-assembly
          - content-build-master-config
          - content-mega-enrichment
          - content-search-facts
          - content-cliche-detector
          - content-save-result
          - save-final-content

          # Orchestration (Batching)
          - collect-audio-scenes
          - collect-image-prompts
          - distribute-audio
          - distribute-images
          - merge-channel-data
          - merge-parallel-results

          # Topics Queue (Sprint 1)
          - content-topics-get-next
          - content-topics-list
          - content-topics-add
          - content-topics-bulk-add
          - content-topics-update-status

          # Dashboard/API
          - content-get-channels
          - content-trigger
          - dashboard-content
          - dashboard-costs
          - dashboard-monitoring
          - system-settings-api

          # Infrastructure
          - ec2-qwen3-control
          - ec2-zimage-control
          - ec2-emergency-stop
          - check-qwen3-health
          - aws-costs-fetcher
          - backfill-costs
          - audio-library-manager
          - update-sfx-library

          # Support
          - telegram-error-notifier
          - log-execution-error
          - schema-validator
          - validate-step-functions-input
          - debug-test-runner

      fail-fast: false  # Continue deploying other functions even if one fails

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Check if function changed
        id: check_changes
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "aws/lambda/${{ matrix.function }}/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Function ${{ matrix.function }} has changes"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Function ${{ matrix.function }} unchanged, skipping"
          fi

      - name: Install dependencies for ${{ matrix.function }}
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd aws/lambda/${{ matrix.function }}

          # Check if requirements.txt exists
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt -t .
          fi

      - name: Create deployment package for ${{ matrix.function }}
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd aws/lambda/${{ matrix.function }}

          # Check if create_zip.py exists (uses shared modules)
          if [ -f "create_zip.py" ]; then
            echo "Using create_zip.py script..."
            python create_zip.py
          else
            # Copy shared modules if they exist and are needed
            if grep -q "from shared\." *.py 2>/dev/null || grep -q "import shared\." *.py 2>/dev/null; then
              echo "Copying shared modules..."
              mkdir -p shared
              cp -r ../shared/*.py shared/ 2>/dev/null || true
            fi

            # Create ZIP package
            echo "Creating ZIP package..."
            zip -r function.zip . -x "*.git*" "*.md" "test_*" "*__pycache__*" "create_zip.py"
          fi

          echo "Deployment package created: $(du -h function.zip | cut -f1)"

      - name: Deploy ${{ matrix.function }} to AWS Lambda
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          aws lambda update-function-code \
            --function-name ${{ matrix.function }} \
            --zip-file fileb://aws/lambda/${{ matrix.function }}/function.zip \
            --region ${{ env.AWS_REGION }}

          echo "Deployed ${{ matrix.function }} successfully"

      - name: Wait for function to update
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          aws lambda wait function-updated \
            --function-name ${{ matrix.function }} \
            --region ${{ env.AWS_REGION }}

          echo "${{ matrix.function }} is now active"

  # Job 4: Deploy Frontend (if changed)
  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend_changed == 'true'

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 3.75.97.188 >> ~/.ssh/known_hosts

      - name: Deploy Frontend files to production server
        run: |
          echo "Deploying frontend files to production..."

          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only HEAD~5 HEAD | grep -E "\.(html|css|js)$" || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No frontend files changed"
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Deploy each changed file
          for file in $CHANGED_FILES; do
            if [[ "$file" == js/* ]]; then
              echo "Deploying $file to /home/ubuntu/web-admin/html/js/"
              scp -o StrictHostKeyChecking=no "$file" ubuntu@3.75.97.188:/home/ubuntu/web-admin/html/js/
            elif [[ "$file" == css/* ]]; then
              echo "Deploying $file to /home/ubuntu/web-admin/html/css/"
              scp -o StrictHostKeyChecking=no "$file" ubuntu@3.75.97.188:/home/ubuntu/web-admin/html/css/
            elif [[ "$file" == *.html ]]; then
              echo "Deploying $file to /home/ubuntu/web-admin/html/"
              scp -o StrictHostKeyChecking=no "$file" ubuntu@3.75.97.188:/home/ubuntu/web-admin/html/
            fi
          done

          echo "Frontend deployment completed successfully!"

  # Job 5: Notify on completion
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-lambda, deploy-frontend]
    if: always()

    steps:
      - name: Deployment Summary
        run: |
          echo "=== Deployment Summary ==="
          echo "Lambda Deployment: ${{ needs.deploy-lambda.result }}"
          echo "Frontend Deployment: ${{ needs.deploy-frontend.result }}"

          if [ "${{ needs.deploy-lambda.result }}" == "success" ]; then
            echo "Lambda functions deployed successfully"
          else
            echo "Lambda deployment had issues"
          fi

      - name: Send Telegram notification (optional)
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            STATUS="${{ needs.deploy-lambda.result }}"
            if [ "$STATUS" == "success" ]; then
              MESSAGE="Production deployment completed successfully"
            else
              MESSAGE="Production deployment failed"
            fi

            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="${MESSAGE}" || true
          else
            echo "Telegram notifications not configured"
          fi
