<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing in...</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #667eea;
            --dark-bg: #1a1d2e;
            --card-bg: #22263a;
            --text-primary: #e5e7eb;
        }

        body {
            background: linear-gradient(135deg, var(--dark-bg) 0%, #16213e 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .callback-container {
            text-align: center;
            max-width: 400px;
            padding: 3rem;
            background: var(--card-bg);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(102, 126, 234, 0.2);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 2rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h2 {
            background: linear-gradient(135deg, var(--primary-color), #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .status-text {
            color: #9ca3af;
            margin-bottom: 0.5rem;
        }

        .error-container {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 1.5rem;
            border-radius: 12px;
            margin-top: 2rem;
        }

        .error-container.show {
            display: block;
        }

        .retry-btn {
            margin-top: 1rem;
            padding: 0.75rem 2rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="callback-container">
        <div class="spinner" id="spinner"></div>
        <h2>Signing you in...</h2>
        <p class="status-text" id="statusText">Verifying your credentials</p>

        <div class="error-container" id="errorContainer">
            <h4>Authentication Failed</h4>
            <p id="errorMessage">An error occurred during sign-in.</p>
            <button class="retry-btn" onclick="retryLogin()">Try Again</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // ============================================
        // AUTH CONFIGURATION
        // ============================================
        const AUTH_CONFIG = {
            region: 'eu-central-1',
            userPoolId: 'eu-central-1_bQB8rhdoH',
            userPoolWebClientId: '78dqpfmq8qn43gmig2pan0v9sb',
            authDomain: 'https://youtube-automation-1764343453.auth.eu-central-1.amazoncognito.com',
            tokenEndpoint: 'https://youtube-automation-1764343453.auth.eu-central-1.amazoncognito.com/oauth2/token'
        };

        // ============================================
        // HANDLE OAUTH CALLBACK
        // ============================================
        async function handleCallback() {
            try {
                // Get authorization code from URL
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const error = urlParams.get('error');

                if (error) {
                    throw new Error(error);
                }

                if (!code) {
                    throw new Error('No authorization code received');
                }

                updateStatus('Exchanging code for tokens...');

                // Exchange code for tokens
                const tokens = await exchangeCodeForTokens(code);

                updateStatus('Decoding user information...');

                // Parse ID token to get user info
                const userInfo = parseJwt(tokens.id_token);

                updateStatus('Creating session...');

                // Save session using AuthManager (uses cookies)
                const authManager = new AuthManager();
                const session = {
                    idToken: tokens.id_token,
                    accessToken: tokens.access_token,
                    refreshToken: tokens.refresh_token,
                    expiresAt: new Date(Date.now() + tokens.expires_in * 1000).toISOString(),
                    user: {
                        user_id: userInfo.sub,
                        email: userInfo.email,
                        name: userInfo.name,
                        picture: userInfo.picture
                    }
                };

                // Save session to cookies
                console.log('📝 Saving session to cookies...');
                console.log('Session object:', session);
                console.log('Session size:', JSON.stringify(session).length, 'bytes');

                authManager.saveSession(session);

                // Verify cookies were set
                console.log('🍪 Cookies after save:', document.cookie);
                const idTokenCookie = authManager.getCookie('auth_id_token');
                const userCookie = authManager.getCookie('auth_user');
                if (idTokenCookie && userCookie) {
                    console.log('✅ Session cookies saved successfully!');
                    console.log('ID Token size:', idTokenCookie.length, 'bytes');
                    console.log('User cookie size:', userCookie.length, 'bytes');
                } else {
                    console.error('❌ Session cookies NOT saved!');
                    console.error('ID Token:', idTokenCookie ? 'YES' : 'NO');
                    console.error('User:', userCookie ? 'YES' : 'NO');
                }

                // TEMPORARILY DISABLED: User creation in DynamoDB
                // This can be added later when we create the user-management Lambda
                // updateStatus('Initializing user account...');
                // await createOrUpdateUser(session.user, tokens.id_token);

                updateStatus('Redirecting to dashboard...');

                // Redirect to dashboard
                setTimeout(() => {
                    console.log('🔄 Redirecting to /index.html');
                    window.location.href = '/index.html';
                }, 1000);

            } catch (error) {
                console.error('Authentication error:', error);
                console.error('Error stack:', error.stack);

                // Show detailed error on screen
                showError(`Authentication failed: ${error.message}\n\nCheck console (F12) for details.`);

                // Don't redirect on error - stay on callback page to see the error
                return;
            }
        }

        // ============================================
        // EXCHANGE CODE FOR TOKENS
        // ============================================
        async function exchangeCodeForTokens(code) {
            const redirectUri = window.location.origin + '/callback.html';

            const params = new URLSearchParams({
                grant_type: 'authorization_code',
                client_id: AUTH_CONFIG.userPoolWebClientId,
                code: code,
                redirect_uri: redirectUri
            });

            const response = await fetch(AUTH_CONFIG.tokenEndpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: params.toString()
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error_description || 'Token exchange failed');
            }

            return await response.json();
        }

        // ============================================
        // PARSE JWT TOKEN
        // ============================================
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                throw new Error('Invalid token format');
            }
        }

        // ============================================
        // CREATE/UPDATE USER IN DYNAMODB
        // ============================================
        async function createOrUpdateUser(user, idToken) {
            // This will call a Lambda function to create/update user in Users table
            const API_URL = 'https://YOUR_LAMBDA_URL.lambda-url.eu-central-1.on.aws/user';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${idToken}`
                    },
                    body: JSON.stringify({
                        user_id: user.user_id,
                        email: user.email,
                        display_name: user.name,
                        profile_picture: user.picture,
                        last_login_at: new Date().toISOString()
                    })
                });

                if (!response.ok) {
                    console.warn('Failed to create/update user in database');
                    // Don't throw error - allow login to continue
                }
            } catch (error) {
                console.warn('Error creating user:', error);
                // Don't throw error - allow login to continue
            }
        }

        // ============================================
        // UI HELPERS
        // ============================================
        function updateStatus(message) {
            document.getElementById('statusText').textContent = message;
        }

        function showError(message) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('statusText').style.display = 'none';
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorContainer').classList.add('show');
        }

        function retryLogin() {
            window.location.href = '/login.html';
        }

        // ============================================
        // START CALLBACK HANDLING
        // ============================================
        window.addEventListener('DOMContentLoaded', handleCallback);
    </script>
</body>
</html>
