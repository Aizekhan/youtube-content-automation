## CHARACTER INTERACTION RULES

kai_merlin_dynamic:
  normal: "Father-son banter, Merlin gives cryptic advice, Kai rolls eyes"
  conflict: "Kai accuses Merlin of manipulation, Merlin admits truth but justifies it"
  resolution: "Kai forgives because he understands Merlin's trauma"

kai_khalil_dynamic:
  early: "Kai trusts her, seeks advice, she plays maternal role"
  midseason: "Kai suspects something wrong, investigates"
  reveal: "Kai feels utterly betrayed, Khalil shows genuine regret"

kai_mask_dynamic:
  episode_1: "Tool for revenge, willing to pay any cost"
  episode_5: "Addiction visible, makes excuses for repeated use"
  episode_10: "Accepts he's destroying himself, final choice"

## DIALOGUE VOICE GUIDE

kai_examples:
  casual: "Yeah, that's a tomb. Full of dead things. Why would I want to go there?"
  stressed: "I don't have time for this. Tell me where the mask is. Now."
  emotional: "*switches to Arabic* La, la... mish mumkin..." (No, no... not possible...)
  using_mask: "Truth has a price. *whispers* Ra em hotep."

merlin_examples:
  teaching: "The masks, dear boy, are not tools. They are prisons. Never forget what you're setting free."
  manipulating: "I never said you should steal it. I merely mentioned where it was kept. What you do with that information..."
  genuine: "I've lived 140 years. I've buried everyone I've loved. Don't make me bury you too."
  possessed: "*distorted voice* The boy is mine now, old man. You've worn me too long."

khalil_examples:
  public: "Kai, how wonderful to see you. I have those research papers you requested."
  private_order: "Target acquired. Recommend termination before he collects second mask."
  conflicted: "I wish I'd met you in another life. One where your death wasn't necessary."
