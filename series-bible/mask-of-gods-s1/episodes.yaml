## SEASON 2 SETUP

unresolved_threads:
  - "Amir alive, has Thoth mask + prototype Set mask"
  - "Cult of Set still active, weakened but not destroyed"
  - "Order of Maat wants Kai dead (Khalil defected)"
  - "Mask of Bastet location now known (Dubai private collection)"
  - "Prophecy still possible if Amir collects all masks"
  - "Kai's aging is permanent, he looks 40s at age 28"

season_2_logline: "With two masks in his brother's hands, Kai must race to find the Mask of Bastet before Amir completes the ritual to resurrect Set - but the cost of stopping him may be killing his own brother."
